name: Rust CI with Fuzzing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: cargo audit || true  # Security advisory check

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2
    
    - name: Format check
      run: cargo fmt -- --check
    - name: Clippy (strict)
      run: cargo clippy -- -D clippy::all -D clippy::pedantic -W clippy::nursery
    - name: Unit tests
      run: cargo test --release
    - name: Doc tests
      run: cargo test --doc
    - name: Property tests
      run: cargo test --test proptest_regression --release

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: taiki-e/install-action@cargo-llvm-cov
    - run: cargo llvm-cov --lcov --output-path lcov.info
    - uses: codecov/codecov-action@v3
      with:
        files: lcov.info
